tile_name: "Shift Register Tile"
tile_author: "Roman Lugo"
top_module: "shift_reg_tile"
shuttle: ""

description: |
  32-bit shift register with parallel load.
  Supports right shift by variable amount and synchronous parallel load.

ports: |
  csr_in[0]   - shift enable
  csr_in[1]   - load enable (takes priority over shift)
  data_reg_a  - parallel load data (32-bit)
  data_reg_b  - shift amount (bits [4:0], 0-31)
  data_reg_c  - register output (32-bit)
  csr_out     - mirrors csr_in[1:0] as status

usage_guide: |
  Assert csr_in[1] to load data_reg_a into the register.
  Assert csr_in[0] to shift right by data_reg_b positions.