tile_name: "Adder Tile"
tile_author: "Roman Lugo"
top_module: "adder_tile"
shuttle: ""

description: |
  32-bit adder tile. Computes the sum of two 32-bit operands.
  Result is available combinationally on the next clock edge.

ports: |
  data_reg_a  - operand A (32-bit input)
  data_reg_b  - operand B (32-bit input)
  data_reg_c  - result A + B (32-bit output)
  csr_in/out  - not used
  clk/arst_n  - clock and reset (present but not used in combinational logic)

usage_guide: |
  Connect operands to data_reg_a and data_reg_b.
  Read result from data_reg_c on the next clock cycle.

tb_description: |
  Tests basic sums, large values and overflow behavior.
